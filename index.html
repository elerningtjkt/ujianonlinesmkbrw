<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login CBT - SMKS 1 BARUNAWATI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0037a3">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CBT BARUNAWATI">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: '#0037a3' },
      fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
    }
  }
}
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  overflow:hidden;
  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

/* IZINKAN INPUT */
input, textarea{
  -webkit-user-select:text;
  -ms-user-select:text;
  user-select:text;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f5f8ff;
  position:relative;
  display:flex;
  flex-direction:column;
}

.bg-wave{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:42vh;
  background:linear-gradient(135deg,#0037a3 0%,#001d56 100%);
  clip-path:ellipse(120% 100% at 50% 100%);
  z-index:-2;
}

.dot{
  position:absolute;
  width:180px;
  height:180px;
  opacity:.15;
  background-image:radial-gradient(#cbd5e1 2px,transparent 2px);
  background-size:18px 18px;
}

.dot1{ top:40px; left:40px; }
.dot2{ right:40px; bottom:120px; }

.login-card{
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,.08),0 5px 10px rgba(0,0,0,.04);
}

.input-focus:focus-within{
  border-color:#0037a3;
  box-shadow:0 0 0 4px rgba(0,55,163,.08);
}
</style>

</head>

<body>

<header class="w-full pt-6 pb-2 flex justify-center items-center z-10">

  <div class="flex items-center gap-4">

    <div class="w-14 h-14 rounded-xl bg-white shadow-md flex items-center justify-center overflow-hidden p-1">
      <img src="LOGO YSL TERBARU.jpg" class="w-full h-full object-contain">
    </div>

    <div class="border-l-2 border-primary pl-3">
      <h1 class="text-lg md:text-xl font-bold text-primary">
        SMKS 1 BARUNAWATI
      </h1>
      <p class="text-sm text-primary/80 font-medium">
        Computer Based Test
      </p>
    </div>

  </div>

</header>

<main class="flex-1 flex items-center justify-center px-4 relative overflow-hidden">

  <div class="dot dot1 hidden md:block"></div>
  <div class="dot dot2 hidden md:block"></div>

  <section class="login-card w-full max-w-md md:max-w-lg rounded-3xl p-8 md:p-10 text-center">

    <h2 class="text-3xl font-bold text-[#001e52] mb-2">Selamat Datang</h2>

    <p class="text-gray-500 text-sm md:text-base mb-8">
      Silahkan login menggunakan username dan password yang telah diberikan.
    </p>

    <form id="loginForm" class="space-y-4">

      <div class="border border-gray-200 rounded-xl px-4 py-3 flex items-center bg-white input-focus">
        <input type="text" id="username" placeholder="Username" required class="w-full outline-none">
      </div>

      <div class="border border-gray-200 rounded-xl px-4 py-3 flex items-center bg-white input-focus">

        <input type="password" id="password" placeholder="Password" required class="w-full outline-none">

        <button type="button" onclick="togglePassword()">👁</button>

      </div>

      <button type="submit"
        class="w-full bg-primary text-white font-semibold py-3 rounded-xl">
        Login
      </button>

    </form>

    <div id="alertBox" class="hidden mt-5 rounded-xl px-4 py-3 text-sm"></div>

  </section>

</main>

<footer class="w-full py-4 flex justify-center text-white text-sm z-10">
  Powered by <b>SMKS 1 BARUNAWATI</b>
</footer>

<div class="bg-wave"></div>

<button id="installBtn" hidden
  class="fixed bottom-5 right-5 bg-primary text-white px-4 py-3 rounded-xl shadow-lg z-50">
  Install Aplikasi
</button>

<script>

// ================= WEB APP =================
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoRPW1RHKRfsLsqbVvGm8MuFJNx65UaJnqx6Pz3MZBDU1kEx873JCPcVjYbqW_72Se/exec";

// TOGGLE PASSWORD
function togglePassword(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

// ALERT
function showAlert(type,message){
  const box = document.getElementById("alertBox");
  box.classList.remove("hidden");
  box.className = "mt-5 px-4 py-3 rounded-xl text-sm " +
    (type==="success"
      ? "bg-green-50 text-green-700"
      : "bg-red-50 text-red-700");

  box.innerHTML = message;
}

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const body = new URLSearchParams();
  body.append("action","login");
  body.append("username",username);
  body.append("password",password);

  const res = await fetch(WEB_APP_URL,{method:"POST",body});
  const data = await res.json();

  if(data.success){
    localStorage.setItem("username",data.data.username);
    window.location.href = data.data.role === "admin" ? "admin.html" : "siswa.html";
  }else{
    showAlert("error",data.message);
  }
});

// SERVICE WORKER
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js", { scope: "./" });
  });
}

// PWA INSTALL
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").hidden = false;
});

document.getElementById("installBtn").addEventListener("click",async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});

// ================= SECURITY LAYER =================

// disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// disable copy paste cut
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

// disable devtools shortcuts
document.addEventListener("keydown", function(e){

  if(e.ctrlKey && ["c","v","u","s","p"].includes(e.key.toLowerCase())){
    e.preventDefault();
  }

  if(e.key === "F12"){
    e.preventDefault();
  }

  if(e.ctrlKey && e.shiftKey){
    if(["i","j","c"].includes(e.key.toLowerCase())){
      e.preventDefault();
    }
  }
});

</script>

</body>
</html>
