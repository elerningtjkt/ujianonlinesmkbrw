<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login CBT - SMKS 1 BARUNAWATI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0037a3">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { primary: '#0037a3' },
      fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
    }
  }
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  overflow:hidden;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f5f8ff;
}

/* Anti copy TEXT saja (tidak ganggu input) */
body{
  -webkit-user-select:none;
  user-select:none;
}

input,textarea{
  -webkit-user-select:text;
  user-select:text;
}

.bg-wave{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:42vh;
  background:linear-gradient(135deg,#0037a3,#001d56);
  clip-path:ellipse(120% 100% at 50% 100%);
  z-index:-1;
}

.login-card{
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,.08);
}
</style>

</head>

<body>

<header class="w-full pt-6 flex justify-center">
  <div class="flex items-center gap-4">
    <img src="LOGO YSL TERBARU.jpg" class="w-14 h-14 rounded-xl bg-white p-1 shadow">
    <div class="border-l-2 border-primary pl-3">
      <h1 class="text-primary font-bold text-lg">SMKS 1 BARUNAWATI</h1>
      <p class="text-primary/70 text-sm">Computer Based Test</p>
    </div>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-4">

<section class="login-card w-full max-w-md p-8 rounded-3xl text-center">

<h2 class="text-3xl font-bold text-[#001e52]">Selamat Datang</h2>
<p class="text-gray-500 mt-2 mb-6 text-sm">
Silahkan login menggunakan username dan password
</p>

<form id="loginForm" class="space-y-4">

<input id="username" class="w-full border rounded-xl px-4 py-3 outline-none" placeholder="Username" required>

<div class="flex border rounded-xl px-4 py-3 bg-white">
<input id="password" type="password" class="w-full outline-none" placeholder="Password" required>
<button type="button" onclick="togglePassword()">👁</button>
</div>

<button class="w-full bg-primary text-white py-3 rounded-xl font-semibold">
Login
</button>

</form>

<div id="alertBox" class="hidden mt-4 text-sm"></div>

</section>

</main>

<div class="bg-wave"></div>

<script>

// ================= LOGIN =================
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoRPW1RHKRfsLsqbVvGm8MuFJNx65UaJnqx6Pz3MZBDU1kEx873JCPcVjYbqW_72Se/exec";

function togglePassword(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

function showAlert(msg,type="error"){
  const box = document.getElementById("alertBox");
  box.classList.remove("hidden");
  box.className = type==="success"
    ? "mt-4 text-green-600"
    : "mt-4 text-red-600";
  box.innerText = msg;
}

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const body = new URLSearchParams();
  body.append("action","login");
  body.append("username",username.value);
  body.append("password",password.value);

  const res = await fetch(WEB_APP_URL,{method:"POST",body});
  const data = await res.json();

  if(data.success){
    localStorage.setItem("username",data.data.username);
    location.href = data.data.role==="admin"?"admin.html":"siswa.html";
  }else{
    showAlert(data.message);
  }
});


// ================= SECURITY (REALISTIC CBT) =================

// disable copy paste
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("cut",e=>e.preventDefault());
document.addEventListener("paste",e=>e.preventDefault());

// disable right click
document.addEventListener("contextmenu",e=>e.preventDefault());

// disable selection
document.addEventListener("selectstart",e=>e.preventDefault());

// block devtools shortcut (best effort)
document.addEventListener("keydown",function(e){

  if(e.key==="F12") e.preventDefault();

  if(e.ctrlKey && e.shiftKey){
    if(["i","j","c"].includes(e.key.toLowerCase())){
      e.preventDefault();
    }
  }

  if(e.ctrlKey){
    if(["u","s"].includes(e.key.toLowerCase())){
      e.preventDefault();
    }
  }

});

</script>

</body>
</html>
