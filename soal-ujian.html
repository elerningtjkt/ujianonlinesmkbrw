<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBT Ujian Online</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{ box-sizing:border-box; }

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#eef3fb;
}

/* LOADING */
#loading{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:18px;
  z-index:9999;
}

.loader{
  width:50px;
  height:50px;
  border-radius:999px;
  border:4px solid #dbeafe;
  border-top:4px solid #1d4ed8;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

/* TIMER */
.timerPulse{ animation:pulse 1s infinite; }

@keyframes pulse{
  0%{opacity:1}
  50%{opacity:.6}
  100%{opacity:1}
}

</style>

</head>

<body>

<!-- LOADING -->
<div id="loading">
  <div class="loader"></div>
  <p class="text-slate-600 text-sm font-medium">Memuat halaman ujian...</p>
</div>

<!-- WRAPPER -->
<div class="w-full h-screen flex flex-col">

<!-- HEADER -->
<header class="h-16 bg-blue-900 text-white flex items-center justify-center shadow-lg">
  <h1 class="font-extrabold text-lg md:text-xl">CBT UJIAN ONLINE</h1>
</header>

<!-- TOP BAR -->
<div class="px-3 pt-3">

<div class="bg-white rounded-2xl shadow-sm border px-4 py-3 flex justify-between">

  <div>
    <p class="text-xs text-slate-400">MATA PELAJARAN</p>
    <h2 id="mapelText" class="font-bold text-slate-700">Loading...</h2>
  </div>

  <div class="flex gap-2 items-center">

    <div id="timerBox" class="bg-blue-50 text-blue-800 px-4 h-11 flex items-center rounded-xl border">
      ⏱ <span id="timer" class="font-bold ml-2">00:00:00</span>
    </div>

    <button id="refreshBtn" class="w-11 h-11 bg-white border rounded-xl">⟳</button>

  </div>

</div>

</div>

<!-- IFRAME -->
<div class="flex-1 p-3">
  <iframe id="examFrame" class="w-full h-full border-0 rounded-2xl bg-white"></iframe>
</div>

</div>

<script>

/* =========================
   SESSION VALIDASI
========================= */

const username = localStorage.getItem("username");
const linkSoal = localStorage.getItem("link_soal");
const namaMapel = localStorage.getItem("nama_mapel");

if(!username || !linkSoal || !namaMapel){
  window.location.href = "index.html";
}

/* =========================
   LOAD SOAL
========================= */

document.getElementById("mapelText").innerText = namaMapel;
document.getElementById("examFrame").src = linkSoal;

/* =========================
   LOADING HIDE
========================= */

document.getElementById("examFrame").onload = () => {
  document.getElementById("loading").style.display = "none";
};

/* =========================
   REFRESH
========================= */

document.getElementById("refreshBtn").onclick = () => {
  document.getElementById("examFrame").src = linkSoal;
};

/* =========================
   TIMER
========================= */

let totalSeconds = 0;

setInterval(() => {
  totalSeconds++;

  let h = String(Math.floor(totalSeconds/3600)).padStart(2,"0");
  let m = String(Math.floor((totalSeconds%3600)/60)).padStart(2,"0");
  let s = String(totalSeconds%60).padStart(2,"0");

  document.getElementById("timer").innerText = `${h}:${m}:${s}`;

},1000);

/* =========================
   🔐 LEVEL 2 ANTI CHEAT
========================= */

/* Disable Right Click */
document.addEventListener("contextmenu", e => e.preventDefault());

/* Disable DevTools */
document.addEventListener("keydown", function(e){

  if(e.key === "F12") e.preventDefault();

  if(e.ctrlKey && e.shiftKey &&
    ["I","J","C"].includes(e.key.toUpperCase())
  ){
    e.preventDefault();
  }

  if(e.ctrlKey && e.key.toLowerCase()==="u"){
    e.preventDefault();
  }

});

/* Anti Copy */
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

/* Tab Switch Detection */
let cheatCount = 0;

document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    cheatCount++;
    alert("⚠ Jangan pindah tab!");

    if(cheatCount >= 3){
      alert("❌ Anda keluar dari ujian");
      localStorage.clear();
      window.location.href = "index.html";
    }
  }
});

/* Fullscreen Lock */
function fullscreen(){
  let el = document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
}

window.addEventListener("load", () => {
  setTimeout(fullscreen, 1000);
});

document.addEventListener("fullscreenchange", () => {
  if(!document.fullscreenElement){
    fullscreen();
  }
});

</script>

</body>
</html>
